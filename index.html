<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merchant Demo Integration</title>
  <style>
    body {
      background-color: #13081b;
      color: #fafaf9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    p {
      color: #a8a29e;
      font-size: 14px;
      margin-top: 0;
      margin-bottom: 24px;
    }
    .card {
      background-color: #ffffff;
      border: 1px solid #a9a9f4;
      border-radius: 16px;
      padding: 24px;
      text-align: left;
      margin-top: 20px;
    }
    pre {
      background-color: #18181b;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #27272a;
      overflow-x: auto;
      font-size: 12px;
      color: #e4e4e7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Instant QRIS Payment Widget</h1>
    <!-- Instant Auto-Rendered QRIS Payment Form Widget -->
    <script src="http://localhost:3000/qris.js" 
            data-merchant-id="mer-001" 
            data-env="sandbox"></script>
  </div>

</body>
</html>
